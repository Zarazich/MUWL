{% extends "base.html" %}
{% block title %}Регистрация — MUWL{% endblock %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <div class="card-header">
        <h2>Регистрация</h2>
        <p>Создайте новый аккаунт</p>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/api/register">
        <div class="form-group">
            <label class="form-label">Телефон</label>
            <input type="tel" name="phone" class="form-input" placeholder="+7 123 456-78-90" required>
        </div>
        <div class="form-group">
            <label class="form-label">Полное имя</label>
            <input type="text" name="full_name" class="form-input" placeholder="Иван Иванов" required>
        </div>
        <div class="form-group">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-input" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
        Уже есть аккаунт? <a href="/login" style="color: var(--primary);">Войти</a>
    </p>
</div>
{% endblock %}
