<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MUWL{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container">
                <div class="header-content">
                    <a href="/" class="logo">MUWL<span>.</span></a>
                    {% if session.user_id %}
                    <nav class="nav">
                        <a href="/" class="nav-link">Главная</a>
                        <a href="/logout" class="btn-logout">Выйти</a>
                    </nav>
                    {% else %}
                    <nav class="nav">
                        <a href="/login" class="nav-link">Войти</a>
                        <a href="/register" class="nav-link">Регистрация</a>
                    </nav>
                    {% endif %}
                </div>
            </div>
        </header>
        <main class="main">
            <div class="container">
                {% block content %}{% endblock %}
            </div>
        </main>
        <footer class="footer">
            <div class="container">
                <p>MUWL — защищённый мессенджер</p>
            </div>
        </footer>
    </div>
</body>
</html>
